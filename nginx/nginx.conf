events {
    worker_connections 1024;
}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream signaling_backend {
        # Docker DNS handles load balancing here
        server signaling-server:8080;
        
        # Keeps connections warm to prevent drops
        keepalive 32; 
    }

    server {
        listen 443 ssl;
        ssl_certificate     /etc/nginx/certs/localhost+3.pem;
        ssl_certificate_key /etc/nginx/certs/localhost+3-key.pem;

        location / {
            proxy_pass https://signaling_backend;

            # Core WebSocket headers
            proxy_ssl_verify off;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            # Client tracking headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Stops WebSockets from dropping every 60 seconds
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}
