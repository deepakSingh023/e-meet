services:


  mongodb:
    image: mongo:8
    container_name: mongodb
    ports:
      - "27017:27017"

  webrtc-client:
    build: ./webrtc-client
    container_name: webrtc-client
    ports:
      - "5173:5173"

  signaling-server:
    build: ./Signalling-server
    depends_on:
      - redis
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ./shared-avatar-uploads:/app/uploads/avatars

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"

  coturn:
    image: coturn/coturn:latest
    container_name: coturn
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
    command: >
      -n
      --realm=localhost
      --lt-cred-mech
      --user=researchuser:palak123
      --listening-port=3478

  nginx:
    image: nginx:latest
    ports:
      - "443:443"
    depends_on:
      - signaling-server
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./webrtc-client/certs:/etc/nginx/certs

